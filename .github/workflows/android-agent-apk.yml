name: Build Android Agent APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Launcher app name"
        required: false
        default: "APK Agent"
      icon_url:
        description: "Public PNG/JPG icon URL"
        required: false
        default: ""
  push:
    paths:
      - "android_agent/**"
      - ".github/workflows/android-agent-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Apply build branding
        shell: bash
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          ICON_URL: ${{ github.event.inputs.icon_url }}
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          app_name = (os.environ.get("APP_NAME") or "APK Agent").strip()[:40]
          path = "android_agent/app/src/main/res/values/strings.xml"
          tree = ET.parse(path)
          root = tree.getroot()
          for item in root.findall("string"):
              if item.attrib.get("name") == "app_name":
                  item.text = app_name
          tree.write(path, encoding="utf-8", xml_declaration=False)
          PY

          if [ -n "$ICON_URL" ]; then
            mkdir -p android_agent/app/src/main/res/drawable
            rm -f android_agent/app/src/main/res/drawable/app_icon.xml
            curl -L --fail "$ICON_URL" -o android_agent/app/src/main/res/drawable/app_icon.png
          fi

      - name: Build debug APK
        run: gradle -p android_agent assembleDebug

      - name: Prepare APK file
        run: |
          mkdir -p dist
          cp android_agent/app/build/outputs/apk/debug/app-debug.apk dist/apk-agent.apk
          test -s dist/apk-agent.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-agent
          path: dist/apk-agent.apk

      - name: Publish latest APK release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-agent-latest
          name: Android Agent Latest
          body: Debug build of APK Agent. Install only on your own devices.
          files: dist/apk-agent.apk
          make_latest: false
          overwrite_files: true
