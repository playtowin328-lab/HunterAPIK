name: Build Android Agent APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Launcher app name"
        required: false
        default: "APK Agent"
      icon_url:
        description: "Public PNG/JPG icon URL"
        required: false
        default: ""
      build_mode:
        description: "Build mode: lite or full"
        required: false
        default: "lite"
  push:
    paths:
      - "android_agent/**"
      - ".github/workflows/android-agent-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Apply build branding
        shell: bash
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          ICON_URL: ${{ github.event.inputs.icon_url }}
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          app_name = (os.environ.get("APP_NAME") or "APK Agent").strip()[:40]
          path = "android_agent/app/src/main/res/values/strings.xml"
          tree = ET.parse(path)
          root = tree.getroot()
          for item in root.findall("string"):
              if item.attrib.get("name") == "app_name":
                  item.text = app_name
          tree.write(path, encoding="utf-8", xml_declaration=False)
          PY

          if [ -n "$ICON_URL" ]; then
            mkdir -p android_agent/app/src/main/res/drawable
            rm -f android_agent/app/src/main/res/drawable/app_icon.xml
              curl -L --fail "$ICON_URL" -o android_agent/app/src/main/res/drawable/app_icon.png
            fi

      - name: Build debug APKs
        shell: bash
        env:
          BUILD_MODE: ${{ github.event.inputs.build_mode }}
        run: |
          gradle -p android_agent assembleLiteDebug assembleFullDebug

      - name: Prepare APK files
        shell: bash
        env:
          BUILD_MODE: ${{ github.event.inputs.build_mode }}
        run: |
          mode="${BUILD_MODE:-lite}"
          lite_apk="android_agent/app/build/outputs/apk/lite/debug/app-lite-debug.apk"
          full_apk="android_agent/app/build/outputs/apk/full/debug/app-full-debug.apk"
          test -s "$lite_apk"
          test -s "$full_apk"
          mkdir -p dist
          cp "$lite_apk" dist/apk-agent-lite.apk
          cp "$full_apk" dist/apk-agent-full.apk
          if [ "$mode" = "full" ]; then
            cp "$full_apk" dist/apk-agent.apk
          else
            cp "$lite_apk" dist/apk-agent.apk
          fi
          sha256sum dist/apk-agent.apk dist/apk-agent-lite.apk dist/apk-agent-full.apk > dist/apk-agent.sha256
          {
            echo "Build mode: $mode"
            echo "APK: dist/apk-agent.apk"
            echo "Lite APK: dist/apk-agent-lite.apk"
            echo "Full APK: dist/apk-agent-full.apk"
          } > dist/build-info.txt

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-agent
          path: |
            dist/apk-agent.apk
            dist/apk-agent-lite.apk
            dist/apk-agent-full.apk

      - name: Publish latest APK release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-agent-latest
          name: Android Agent Latest
          body: Lite debug build by default. Install only on your own devices.
          files: |
            dist/apk-agent.apk
            dist/apk-agent-lite.apk
            dist/apk-agent-full.apk
            dist/apk-agent.sha256
            dist/build-info.txt
          make_latest: false
          overwrite_files: true
