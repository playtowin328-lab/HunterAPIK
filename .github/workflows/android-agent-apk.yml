name: Build Android Agent APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Launcher app name"
        required: false
        default: "Hunter Agent"
      icon_url:
        description: "Public PNG/JPG icon URL"
        required: false
        default: ""
  push:
    paths:
      - "android_agent/**"
      - ".github/workflows/android-agent-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Apply build branding
        shell: bash
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          ICON_URL: ${{ github.event.inputs.icon_url }}
        run: |
          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET

          app_name = " ".join((os.environ.get("APP_NAME") or "Hunter Agent").split())[:40] or "Hunter Agent"
          path = "android_agent/app/src/main/res/values/strings.xml"
          tree = ET.parse(path)
          root = tree.getroot()
          for item in root.findall("string"):
              if item.attrib.get("name") == "app_name":
                  item.text = app_name
              elif item.attrib.get("name") == "notification_title":
                  item.text = f"{app_name} активен"
          tree.write(path, encoding="utf-8", xml_declaration=False)

          with open("android_agent/app/src/main/assets-build-info.txt", "w", encoding="utf-8") as fh:
              fh.write(f"App name: {app_name}\n")
              fh.write("Mode: full\n")
              fh.write(f"Custom icon: {'yes' if os.environ.get('ICON_URL') else 'no'}\n")
          PY

          if [ -n "$ICON_URL" ]; then
            mkdir -p android_agent/app/src/main/res/drawable
            rm -f android_agent/app/src/main/res/drawable/app_icon.xml
            curl -L --fail --retry 2 --max-time 30 "$ICON_URL" -o android_agent/app/src/main/res/drawable/app_icon.png
          fi

      - name: Build Full APK
        shell: bash
        run: |
          gradle -p android_agent assembleDebug

      - name: Prepare APK files
        shell: bash
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          ICON_URL: ${{ github.event.inputs.icon_url }}
        run: |
          full_apk="android_agent/app/build/outputs/apk/debug/app-debug.apk"
          test -s "$full_apk"
          mkdir -p dist
          cp "$full_apk" dist/apk-agent-full.apk
          cp "$full_apk" dist/apk-agent.apk
          sha256sum dist/apk-agent.apk dist/apk-agent-full.apk > dist/apk-agent.sha256
          {
            echo "App name: ${APP_NAME:-Hunter Agent}"
            echo "Build mode: full"
            echo "APK: dist/apk-agent.apk"
            echo "Full APK: dist/apk-agent-full.apk"
            if [ -n "$ICON_URL" ]; then
              echo "Custom icon: yes"
            else
              echo "Custom icon: no"
            fi
            echo "Commit: $GITHUB_SHA"
            echo "Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } > dist/build-info.txt

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: apk-agent
          path: |
            dist/apk-agent.apk
            dist/apk-agent-full.apk

      - name: Publish latest APK release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-agent-latest
          name: Android Agent Latest
          body: |
            Latest Android Agent APK build.

            Full Android Agent APK with explicit Android permission setup.
            Install only on your own devices and keep Android permissions visible to the user.
          files: |
            dist/apk-agent.apk
            dist/apk-agent-full.apk
            dist/apk-agent.sha256
            dist/build-info.txt
          make_latest: false
          overwrite_files: true
