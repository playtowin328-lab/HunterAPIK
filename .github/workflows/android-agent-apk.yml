name: Build Android Agent APK

on:
  workflow_dispatch:
  push:
    paths:
      - "android_agent/**"
      - ".github/workflows/android-agent-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: gradle -p android_agent assembleDebug

      - name: Prepare APK file
        run: |
          mkdir -p dist
          cp android_agent/app/build/outputs/apk/debug/app-debug.apk dist/apk-agent.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-agent
          path: dist/apk-agent.apk

      - name: Publish latest APK release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-agent-latest
          name: Android Agent Latest
          body: Debug build of APK Agent. Install only on your own devices.
          files: dist/apk-agent.apk
          make_latest: false
